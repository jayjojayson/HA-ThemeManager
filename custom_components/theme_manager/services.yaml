apply_theme:
  name: Theme anwenden
  description: Wendet ein Theme auf das Frontend an (für alle Benutzer).
  fields:
    theme_name:
      name: Theme-Name
      description: >-
        Name des Themes wie in der YAML-Datei definiert (z.B. "Modern Dark",
        "Dracula"). Mit "default" wird das Standard-Theme gesetzt.
      required: true
      example: "Modern Dark"
      selector:
        text:

reload_themes:
  name: Themes neu laden
  description: >-
    Lädt alle Themes aus /config/themes/ neu. Neu hinzugefügte oder geänderte
    Dateien werden anschließend ohne Neustart erkannt.

list_themes:
  name: Themes auflisten
  description: >-
    Schreibt alle verfügbaren Theme-Namen aus /config/themes/ ins Home-Assistant-Log.
